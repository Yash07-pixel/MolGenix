services:
  db:
    image: postgres:15
    container_name: molgenix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: molgenix
      POSTGRES_PASSWORD: password
      POSTGRES_DB: molgenix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molgenix -d molgenix"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: molgenix-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://molgenix:password@db:5432/molgenix
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - ./backend/alembic.ini:/app/alembic.ini
    command: sh /app/start.sh

  adminer:
    image: adminer:latest
    container_name: molgenix-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
